<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Primary SEO -->
    <title>Briefwise — Turn any PDF into a Smart Dashboard</title>
    <meta name="description" content="Upload any invoice or report and Briefwise instantly extracts key metrics, builds interactive charts, and generates an AI-powered summary. Free to try." />
    <meta name="keywords" content="PDF analysis, PDF to dashboard, invoice analyzer, report summarizer, AI PDF, document intelligence, PDF charts, PDF insights" />
    <link rel="canonical" href="https://briefwise.online" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Briefwise" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Briefwise" />
    <meta property="og:title" content="Briefwise — Turn any PDF into a Smart Dashboard" />
    <meta property="og:description" content="Upload any invoice or report and Briefwise instantly extracts key metrics, builds interactive charts, and generates an AI-powered summary. Free to try." />
    <meta property="og:url" content="https://briefwise.online" />
    <meta property="og:image" content="https://briefwise.online/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Briefwise — PDF to Smart Dashboard" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Briefwise — PDF to Smart Dashboard" />
    <meta name="twitter:description" content="AI extracts metrics, charts, and summaries from any PDF invoice or report. Free to try." />
    <meta name="twitter:image" content="https://briefwise.online/og-image.png" />

    <!-- WebApplication structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Briefwise",
      "url": "https://briefwise.online",
      "description": "Turn any PDF into a smart dashboard. AI extracts metrics, charts, and summaries from invoices and reports instantly.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "inLanguage": "en-US",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "3 PDF analyses per month"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "9",
          "priceCurrency": "USD",
          "description": "Unlimited PDF analyses"
        }
      ]
    }
    </script>

    <!-- FAQ structured data (rich results in Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What types of PDFs does Briefwise support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Briefwise works best with text-based PDFs — invoices, financial reports, business reports, contracts, and research papers. Scanned image-based PDFs are not currently supported."
          }
        },
        {
          "@type": "Question",
          "name": "How long does PDF analysis take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most PDFs are analyzed in 15–30 seconds. Larger documents may take up to 60 seconds. The AI uses Claude by Anthropic for accurate extraction."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your PDF is processed in memory and never permanently stored. Document sessions expire after 2 hours. Shared links only expose analysis results, never the original file. We do not sell your data."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after the 3 free analyses?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can upgrade to Pro for $9/month for unlimited analyses. Your free count resets every 30 days. No credit card required for the free tier."
          }
        },
        {
          "@type": "Question",
          "name": "Can I share my dashboard with someone who doesn't have an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Click Share on any dashboard to generate a read-only link. Anyone with the link can view charts, metrics, and summary without logging in. Share links are valid for 30 days."
          }
        },
        {
          "@type": "Question",
          "name": "What AI model powers Briefwise?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Briefwise is powered by Claude by Anthropic, one of the most accurate AI models for document understanding, ensuring high-quality metric extraction and summaries."
          }
        }
      ]
    }
    </script>

    <!-- HowTo structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to analyze a PDF with Briefwise",
      "description": "Turn any PDF invoice or report into an interactive dashboard in 3 steps",
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Upload your PDF",
          "text": "Drag and drop any invoice or business report onto the Briefwise upload area. Files up to 50 MB are supported."
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "AI analyzes in seconds",
          "text": "Claude AI automatically extracts key metrics, builds chart data, identifies highlights and anomalies, and generates an executive summary."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Explore your dashboard",
          "text": "Interact with charts, ask questions about the document, export as PNG or CSV, or share a read-only link with colleagues."
        }
      ]
    }
    </script>

    <!-- Fonts with display=swap to prevent render blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
